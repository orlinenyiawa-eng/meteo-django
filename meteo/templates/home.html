<!DOCTYPE html>
<html>
<head>
    <title>Météo</title>
</head>
<body>
    <h1>Application Météo</h1>

    <form method="get">
        <input type="text" name="city" placeholder="Entrer une ville">
        <button type="submit">Rechercher</button>
    </form>

    <h2>{{ city }}</h2>
    <p>Température : {{ temperature }} °C</p>
    <p>Description : {{ description }}</p>
</body>
</html>
